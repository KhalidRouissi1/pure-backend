name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/ci.yml

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/watani_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm test -- --runInBand
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pure-backend:new ./backend

      - name: Save Docker image
        run: docker save pure-backend:new | gzip > pure-backend-new.tar.gz

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Write backend env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          AUTH_TRUSTED_ORIGINS: ${{ secrets.AUTH_TRUSTED_ORIGINS }}
          AUTH_REQUIRE_EMAIL_VERIFICATION: ${{ secrets.AUTH_REQUIRE_EMAIL_VERIFICATION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PORT: ${{ secrets.PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: |
          test -n "$DATABASE_URL"
          test -n "$BETTER_AUTH_SECRET"
          test -n "$BETTER_AUTH_URL"
          test -n "$AUTH_TRUSTED_ORIGINS"
          test -n "$CORS_ORIGIN"
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'BETTER_AUTH_SECRET=%s\n' "$BETTER_AUTH_SECRET"
            printf 'BETTER_AUTH_URL=%s\n' "$BETTER_AUTH_URL"
            printf 'AUTH_TRUSTED_ORIGINS=%s\n' "$AUTH_TRUSTED_ORIGINS"
            printf 'AUTH_REQUIRE_EMAIL_VERIFICATION=%s\n' "${AUTH_REQUIRE_EMAIL_VERIFICATION:-false}"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'AUTH_EMAIL_FROM=%s\n' "$AUTH_EMAIL_FROM"
            printf 'CLOUDINARY_CLOUD_NAME=%s\n' "$CLOUDINARY_CLOUD_NAME"
            printf 'CLOUDINARY_API_KEY=%s\n' "$CLOUDINARY_API_KEY"
            printf 'CLOUDINARY_API_SECRET=%s\n' "$CLOUDINARY_API_SECRET"
            printf 'PORT=%s\n' "${PORT:-3000}"
            printf 'NODE_ENV=%s\n' "${NODE_ENV:-development}"
            printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN"
          } > pure-backend.env
          chmod 600 pure-backend.env

      - name: Upload deploy files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          test -n "$EC2_USER"
          scp -i ~/.ssh/deploy_key pure-backend-new.tar.gz "$EC2_USER@$EC2_HOST:/tmp/pure-backend-new.tar.gz"
          scp -i ~/.ssh/deploy_key pure-backend.env "$EC2_USER@$EC2_HOST:/tmp/pure-backend.env"

      - name: Restart backend
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' <<'EOF'
          set -euo pipefail

          ENV_FILE="$HOME/pure-backend.env"
          install -m 600 /tmp/pure-backend.env "$ENV_FILE"

          DOCKER="docker"
          if ! docker info >/dev/null 2>&1; then
            DOCKER="sudo docker"
          fi

          gzip -dc /tmp/pure-backend-new.tar.gz | $DOCKER load
          $DOCKER stop pure-backend || true
          $DOCKER rm pure-backend || true
          $DOCKER run -d \
            --name pure-backend \
            --restart unless-stopped \
            --env-file "$ENV_FILE" \
            -p 127.0.0.1:3001:3000 \
            pure-backend:new

          rm -f /tmp/pure-backend-new.tar.gz /tmp/pure-backend.env
          for ATTEMPT in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/api/health/live; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done

          $DOCKER ps -a --filter name=pure-backend
          $DOCKER logs --tail 200 pure-backend || true
          exit 1
          EOF
