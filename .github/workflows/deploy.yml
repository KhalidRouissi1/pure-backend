name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pure-backend:new ./backend

      - name: Save Docker image
        run: docker save pure-backend:new | gzip > pure-backend-new.tar.gz

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload Docker image
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          test -n "$EC2_USER"
          scp -i ~/.ssh/deploy_key pure-backend-new.tar.gz "$EC2_USER@$EC2_HOST:/tmp/pure-backend-new.tar.gz"

      - name: Restart backend
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' <<'EOF'
          set -euo pipefail

          ENV_FILE="$HOME/pure-backend.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing env file: $ENV_FILE" >&2
            exit 1
          fi

          DOCKER="docker"
          if ! docker info >/dev/null 2>&1; then
            DOCKER="sudo docker"
          fi

          gzip -dc /tmp/pure-backend-new.tar.gz | $DOCKER load
          $DOCKER stop pure-backend || true
          $DOCKER rm pure-backend || true
          $DOCKER stop nestapp || true
          $DOCKER rm nestapp || true
          $DOCKER run -d \
            --name pure-backend \
            --restart unless-stopped \
            --env-file "$ENV_FILE" \
            -p 127.0.0.1:3000:3000 \
            pure-backend:new

          rm -f /tmp/pure-backend-new.tar.gz
          sleep 5
          curl -fsS http://127.0.0.1:3000/api/health/live
          EOF
